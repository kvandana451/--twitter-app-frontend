<!-- TEMPLATE DRIVEN FORM-->
<div class="form-container">
    <form #signupForm="ngForm" (ngSubmit)="onSignUp(signupForm)">
        <h2>Sign Up</h2>
        <div class="form-group">
            <label>User Name:</label>
            <input type="text" name="username" [(ngModel)]="user.name" #username="ngModel" required />
        </div>
        <div class="form-group">
            <label>Email:</label>
            <!-- Here email at the end of the input tag is Angulars default validator for email -->
            <input name="email" [(ngModel)]="user.email" #email="ngModel" required email />
            <!-- <p>{{email.value}}</p> -->
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" [(ngModel)]="user.password" #password="ngModel" required />
        </div>
        <button>Sign Up</button>
        <div class="redirect-login">
            <span class="line-text">Already have an account?&nbsp;<a routerLink="/login">Login</a></span>
        </div>
    </form>
</div>


<!-- 
The name attribute tells the server which input value belongs to which field during form submission.
-->

<!-- 
Meaning of #username="ngModel"

This creates a template reference variable called username
And it points to the Angular NgModel directive, NOT the input element itself.

It allows you to access the state of the input field in the template, like:
Is it valid / invalid
Is it touched / untouched
Is it dirty / pristine
What are its validation errors

Without "ngModel"
#username 
Refers to the HTML input element

With "ngModel"
#username="ngModel"
Refers to Angular’s NgModel object

'ngForm':It gives you the STATE of the ENTIRE FORM
So:
Each ngModel → validates its own field
ngForm → aggregates all those results
-->
