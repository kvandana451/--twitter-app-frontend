<div *ngFor="let tweet of tweets" class="my-card-container">
    <p-card styleClass="my-card">
        <ng-template pTemplate="header"> {{tweet.createdby.username}}</ng-template>
        <ng-template pTemplate="content"> {{tweet.content}} </ng-template>
        <ng-template pTemplate="footer">
            <div>
                <button (click)="likeTweet('Tweet', tweet._id)"> <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    {{tweet.likes.length?tweet.likes.length:0}}Like
                </button>

            </div>
            <div>
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" class="comment-btn" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 10H7a2 2 0 01-2-2V6a2 2 0 012-2h6a2 2 0 012 2v2a2 2 0 01-2 2zM15 10h2a2 2 0 012 2v2a2 2 0 01-2 2H9a2 2 0 01-2-2v-2a2 2 0 012-2h2m4 0v2m-4 0v2">
                        </path>
                    </svg>
                    <p>Comment</p>
                </button>

            </div>
        </ng-template>

    </p-card>

    <app-commemts class="comments-section" [tweetId]="tweet._id" [comments]="tweet.comments"
        [isRoot]="true"></app-commemts><!--sending data from parent to child component
-->
</div>
